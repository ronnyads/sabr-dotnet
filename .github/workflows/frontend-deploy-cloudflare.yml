# Pipeline: Angular → Cloudflare Pages
# Repo: ronnyads/sabr-frontend
#
# Secrets necessários (GitHub → Settings → Secrets):
#   CLOUDFLARE_API_TOKEN  → token com permissão "Cloudflare Pages:Edit"
#
# Variables necessárias (GitHub → Settings → Variables):
#   CLOUDFLARE_ACCOUNT_ID → ID da sua conta Cloudflare
#   CF_PAGES_PROJECT_NAME → nome do projeto criado no Cloudflare Pages (ex: sabr-frontend)

name: frontend-deploy

on:
  push:
    branches: [develop, main]
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: '20'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'development' }}

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node + cache ───────────────────────────────────────────────────────
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # ── 3. Instalar dependências ───────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Lint ───────────────────────────────────────────────────────────────
      - name: Lint
        run: npm run lint --if-present

      # ── 5. Testes unitários ────────────────────────────────────────────────────
      - name: Test
        run: npm run test -- --watch=false --browsers=ChromeHeadless --no-progress
        continue-on-error: true    # não bloqueia deploy, mas aparece no relatório

      # ── 6. Build ──────────────────────────────────────────────────────────────
      - name: Build
        env:
          CONFIGURATION: ${{ github.ref_name == 'main' && 'production' || 'development' }}
        run: npm run build -- --configuration $CONFIGURATION

      # Detecta o diretório de output (Angular 17+ usa dist/<app>/browser)
      - name: Find dist directory
        id: dist
        run: |
          if [ -d "dist" ]; then
            # Angular 17+: dist/<app>/browser
            BROWSER_DIR=$(find dist -name "browser" -type d 2>/dev/null | head -1)
            if [ -n "$BROWSER_DIR" ]; then
              echo "dir=$BROWSER_DIR" >> $GITHUB_OUTPUT
            else
              # Angular ≤16: dist/<app>
              echo "dir=$(ls -d dist/*/ | head -1)" >> $GITHUB_OUTPUT
            fi
          fi
          echo "Dist dir: $(cat $GITHUB_OUTPUT | grep dir)"

      # ── 7. Deploy para Cloudflare Pages ───────────────────────────────────────
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: >
            pages deploy ${{ steps.dist.outputs.dir }}
            --project-name=${{ vars.CF_PAGES_PROJECT_NAME }}
            --branch=${{ github.ref_name }}
            --commit-hash=${{ github.sha }}
            --commit-message="${{ github.event.head_commit.message }}"
