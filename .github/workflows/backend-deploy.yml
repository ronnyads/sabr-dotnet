# Pipeline: .NET API → Fly.io
# Substitui o backend-deploy.yml (AWS ECS)
#
# Secret necessário (GitHub → Settings → Secrets):
#   FLY_API_TOKEN → token gerado via: flyctl auth token

name: backend-deploy

on:
  push:
    branches: [develop, main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'Dockerfile'
      - 'fly.toml'
      - '.github/workflows/backend-deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'development' }}

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Setup .NET ─────────────────────────────────────────────────────────
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # ── 3. Restore e Build ────────────────────────────────────────────────────
      - name: Restore
        run: dotnet restore SabrHub.sln

      - name: Build
        run: dotnet build SabrHub.sln --configuration Release --no-restore

      # ── 4. Testes unitários (exclui integration que precisam de banco) ─────────
      - name: Test
        run: dotnet test SabrHub.sln --configuration Release --no-build --filter "FullyQualifiedName!~Integration"

      # ── 5. Deploy para Fly.io ─────────────────────────────────────────────────
      - name: Deploy to Fly.io
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Fly deploy
        run: |
          # dev → sabr-api-dev | main → sabr-api
          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            APP="sabr-api"
          else
            APP="sabr-api-dev"
          fi

          flyctl deploy \
            --app "$APP" \
            --remote-only \
            --wait-timeout 300
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
