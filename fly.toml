# fly.toml — Sabr API on Fly.io (São Paulo)
# Deploy: flyctl deploy
# Docs: https://fly.io/docs/reference/configuration/

app = "sabr-api"
primary_region = "gru"   # São Paulo, Brazil

[build]
  dockerfile = "Dockerfile"

[env]
  ASPNETCORE_ENVIRONMENT = "Production"
  ASPNETCORE_URLS        = "http://+:8080"

[http_service]
  internal_port        = 8080
  force_https          = true
  auto_stop_machines   = "stop"
  auto_start_machines  = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "requests"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  size   = "shared-cpu-1x"
  memory = "512mb"

[checks]
  [checks.health]
    grace_period = "10s"
    interval     = "30s"
    method       = "GET"
    path         = "/health/live"
    port         = 8080
    timeout      = "5s"
    type         = "http"
